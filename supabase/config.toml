# Equivalent of what `supabase init` generates. Trimmed to the essentials;
# run `supabase init`/`supabase start` locally to expand with full defaults.
project_id = "smart-pantry"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:5173"

# Edge Function: keep JWT verification on so only authenticated users can call it.
[functions.extract-ingredients]
verify_jwt = true
